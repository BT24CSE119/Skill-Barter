name: skill_barter_new_project
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🌐 Localization (IMPORTANT)
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ================= STATE MANAGEMENT =================
  provider: ^6.1.2

  # ================= FIREBASE =================
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  # ================= LOCAL STORAGE =================
  shared_preferences: ^2.3.0

  # ================= SOCIAL LOGIN =================
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.0
  font_awesome_flutter: ^10.7.0

  # ================= UTILITIES =================
  intl: ^0.20.2
  http: ^1.2.2

  # ================= MEDIA =================
  image_picker: ^1.2.1

  # ================= NOTIFICATIONS =================
  flutter_local_notifications: ^18.0.0

  # ================= VIDEO CALL (ZEGO) =================
  permission_handler: ^12.0.1
  zego_uikit_prebuilt_call: ^4.22.4
  zego_uikit_signaling_plugin: ^2.8.20
  zego_zim: 2.21.1+1

  # ================= CALL AUDIO =================
  audioplayers: ^6.6.0
  vibration: ^3.1.3

  # ================= UTIL =================
  url_launcher: ^6.3.0

  # ================= CHART =================
  fl_chart: ^0.68.0
  firebase_storage: ^13.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ✅ ADD THIS
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  permission_handler: ^12.0.1
  zego_zim: 2.21.1+1

# ✅ ADD THIS SECTION (VERY IMPORTANT)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/icon/app_icon.png   # ✅ ADD THIS

  # 🔥 REQUIRED FOR LOCALIZATION GENERATION
  generate: true